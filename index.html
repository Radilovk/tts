<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Уеб приложение за синтез на реч чрез Gemini TTS">
    <title>Gemini TTS — Четец на глас</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <span class="app-icon">🔊</span>
            <h1 class="app-title">Gemini TTS</h1>
        </div>
        <div class="header-right">
            <button id="btnHistory" class="icon-btn" title="История" aria-label="История">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </button>
            <button id="btnTheme" class="icon-btn" title="Тема" aria-label="Смяна на тема">
                <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button id="btnSettings" class="icon-btn" title="Настройки" aria-label="Настройки">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>
    </header>

    <!-- Settings Panel (Slide-in) -->
    <div id="settingsOverlay" class="overlay hidden"></div>
    <aside id="settingsPanel" class="settings-panel hidden">
        <div class="panel-header">
            <h2>⚙️ Настройки</h2>
            <button id="btnCloseSettings" class="icon-btn" aria-label="Затвори настройки">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="panel-body">
            <!-- API Key -->
            <div class="setting-group">
                <label for="apiKey">🔑 API Ключ</label>
                <div class="input-with-btn">
                    <input type="password" id="apiKey" placeholder="Въведете вашия Gemini API ключ" autocomplete="off">
                    <button id="btnToggleKey" class="icon-btn-sm" title="Покажи/Скрий" aria-label="Покажи или скрий ключа">
                        <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <small class="hint">Ключът се запазва локално в браузъра</small>
            </div>

            <!-- API Endpoint -->
            <div class="setting-group">
                <label for="apiEndpoint">🌐 API Адрес</label>
                <select id="apiEndpoint">
                    <option value="generativelanguage">Google AI (generativelanguage.googleapis.com)</option>
                    <option value="aiplatform">Vertex AI (aiplatform.googleapis.com)</option>
                </select>
            </div>

            <!-- Model -->
            <div class="setting-group">
                <label for="modelSelect">🤖 Модел</label>
                <select id="modelSelect">
                    <optgroup label="TTS Модели">
                        <option value="gemini-2.5-flash-preview-tts" selected>Gemini 2.5 Flash TTS</option>
                        <option value="gemini-2.5-pro-preview-tts">Gemini 2.5 Pro TTS</option>
                    </optgroup>
                    <optgroup label="Мултимодални модели">
                        <option value="gemini-2.5-flash-lite-preview-tts">Gemini 2.5 Flash Lite TTS</option>
                    </optgroup>
                </select>
            </div>

            <!-- Voice -->
            <div class="setting-group">
                <label for="voiceSelect">🎙️ Глас</label>
                <select id="voiceSelect">
                    <option value="Zephyr">Zephyr — Ярък</option>
                    <option value="Puck">Puck — Весел</option>
                    <option value="Charon">Charon — Информативен</option>
                    <option value="Kore" selected>Kore — Твърд</option>
                    <option value="Fenrir">Fenrir — Вълнуващ</option>
                    <option value="Aoede">Aoede — Свеж</option>
                    <option value="Leda">Leda — Младежки</option>
                    <option value="Orus">Orus — Стабилен</option>
                    <option value="Perseus">Perseus — Неутрален</option>
                </select>
            </div>

            <!-- Speed -->
            <div class="setting-group">
                <label for="speedSlider">⚡ Скорост на възпроизвеждане: <span id="speedValue">1.0x</span></label>
                <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
                <div class="range-labels">
                    <span>0.5x</span>
                    <span>1.0x</span>
                    <span>2.0x</span>
                </div>
            </div>

            <!-- Auto-play -->
            <div class="setting-group">
                <label class="toggle-label">
                    <span>▶️ Автоматично пускане</span>
                    <input type="checkbox" id="autoPlay" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- Max chunk size -->
            <div class="setting-group">
                <label for="chunkSize">📏 Максимален размер на текстов блок</label>
                <select id="chunkSize">
                    <option value="500">500 символа</option>
                    <option value="1000" selected>1000 символа</option>
                    <option value="2000">2000 символа</option>
                    <option value="5000">5000 символа</option>
                </select>
                <small class="hint">За дълги текстове, разделяне на по-малки части</small>
            </div>

            <!-- Translation Model -->
            <div class="setting-group">
                <label for="translationModel">🌍 Модел за превод</label>
                <select id="translationModel">
                    <option value="gemini-2.5-flash-lite" selected>Gemini 2.5 Flash Lite (бърз)</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (точен)</option>
                </select>
            </div>

            <!-- Clear data -->
            <div class="setting-group">
                <button id="btnClearHistory" class="btn btn-outline btn-danger">🗑️ Изчисти историята</button>
                <button id="btnClearAll" class="btn btn-outline btn-danger">⚠️ Изчисти всички данни</button>
            </div>
        </div>
    </aside>

    <!-- History Panel (Slide-in) -->
    <div id="historyOverlay" class="overlay hidden"></div>
    <aside id="historyPanel" class="history-panel hidden">
        <div class="panel-header">
            <h2>📜 История</h2>
            <button id="btnCloseHistory" class="icon-btn" aria-label="Затвори история">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="panel-body">
            <div id="historyList" class="history-list">
                <p class="empty-state">Все още няма генерирани аудио файлове.</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="app-main">
        <!-- Translation Toggle -->
        <div class="translation-bar">
            <label class="toggle-label compact">
                <span>🌐 Превод EN → BG</span>
                <input type="checkbox" id="translateToggle">
                <span class="toggle-slider"></span>
            </label>
            <div id="translationStatus" class="translation-status hidden">
                <span class="status-dot"></span>
                <span class="status-text">Готов за превод</span>
            </div>
        </div>

        <!-- Text Input Area -->
        <div class="text-section">
            <div class="text-header">
                <span id="charCount" class="char-count">0 символа</span>
                <div class="text-actions">
                    <button id="btnPaste" class="icon-btn-sm" title="Постави от клипборда" aria-label="Постави текст">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                    </button>
                    <button id="btnClear" class="icon-btn-sm" title="Изчисти текста" aria-label="Изчисти текста">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>
            <textarea id="textInput" placeholder="Въведете текст за четене на глас..." rows="6"></textarea>

            <!-- File Upload -->
            <div class="file-upload-area" id="dropZone">
                <input type="file" id="fileInput" accept=".txt,.md,.html,.srt,.csv,.json" hidden>
                <button id="btnUpload" class="btn btn-outline">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Качи файл с текст
                </button>
                <small>Поддържани: .txt, .md, .html, .srt</small>
            </div>
        </div>

        <!-- Translation Preview -->
        <div id="translationPreview" class="translation-preview hidden">
            <div class="preview-header">
                <h3>🇧🇬 Преведен текст</h3>
                <div class="preview-actions">
                    <button id="btnCopyTranslation" class="icon-btn-sm" title="Копирай превода" aria-label="Копирай превода">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <button id="btnUseTranslation" class="icon-btn-sm" title="Използвай превода" aria-label="Използвай превода">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    </button>
                </div>
            </div>
            <div id="translatedText" class="translated-text"></div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <div class="main-controls">
                <button id="btnTranslate" class="btn btn-secondary hidden" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
                    Преведи
                </button>
                <button id="btnGenerate" class="btn btn-primary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Генерирай реч
                </button>
            </div>

            <!-- Progress -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <span id="progressText" class="progress-text">Генериране...</span>
            </div>
        </div>

        <!-- Audio Player -->
        <div id="playerSection" class="player-section hidden">
            <div class="player-card">
                <div class="player-info">
                    <span class="player-title" id="playerTitle">Аудио</span>
                    <span class="player-duration" id="playerDuration">0:00</span>
                </div>
                <audio id="audioPlayer" controls></audio>
                <div class="player-actions">
                    <button id="btnDownload" class="btn btn-outline btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Изтегли
                    </button>
                    <button id="btnRegenerate" class="btn btn-outline btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        Повтори
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loadingText">Зареждане...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
